<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给宋闻溪 · 天天开心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:"PingFang SC","Microsoft YaHei",sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0d0d1a;
overflow:hidden;
position:relative
}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:1}
.g1{width:450px;height:450px;background:rgba(106,90,205,0.15);top:-150px;left:-100px;animation:f1 10s ease-in-out infinite alternate}
.g2{width:400px;height:400px;background:rgba(100,149,237,0.1);bottom:-120px;right:-80px;animation:f2 12s ease-in-out infinite alternate}
.g3{width:250px;height:250px;background:rgba(147,112,219,0.08);top:40%;left:50%;animation:pulse 7s ease-in-out infinite alternate}
@keyframes f1{0%{transform:translate(0,0)}100%{transform:translate(70px,50px)}}
@keyframes f2{0%{transform:translate(0,0)}100%{transform:translate(-60px,-40px)}}
@keyframes pulse{0%{opacity:0.3;transform:scale(1) translate(-50%,-50%)}100%{opacity:0.7;transform:scale(1.5) translate(-50%,-50%)}}
.card{
position:relative;z-index:2;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(28px);
-webkit-backdrop-filter:blur(28px);
border:1px solid rgba(255,255,255,0.06);
border-radius:36px;
padding:4rem 3.5rem;
max-width:620px;width:92%;
text-align:center;
box-shadow:0 40px 100px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
animation:inAnim 1.2s cubic-bezier(0.16,1,0.3,1) both
}
@keyframes inAnim{from{opacity:0;transform:scale(0.85) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ornament{font-size:1.1rem;letter-spacing:12px;color:rgba(180,160,255,0.35);margin-bottom:1.2rem}
.title{font-size:2.8rem;font-weight:800;line-height:1.3;margin-bottom:0.2rem}
.title .prefix{background:linear-gradient(135deg,#B8A0FF,#7C6BDB,#B8A0FF);background-size:200% 200%;
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
animation:shimmer 4s ease-in-out infinite;letter-spacing:8px}
.title .name{color:rgba(255,255,255,0.9);letter-spacing:6px;display:block;margin-top:0.2rem}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sub{font-size:1.25rem;color:rgba(255,255,255,0.35);letter-spacing:6px;margin-bottom:1.5rem;font-weight:300}
hr.div{border:none;height:1px;width:60%;margin:0 auto 1.8rem;
background:linear-gradient(90deg,transparent,rgba(150,130,255,0.3),transparent)}
.stars-row{font-size:1.5rem;letter-spacing:8px;margin-bottom:2rem;display:flex;justify-content:center;gap:0.4rem}
.star-ico{display:inline-block;animation:twinkle 2s ease-in-out infinite}
.star-ico:nth-child(2){animation-delay:0.3s}.star-ico:nth-child(3){animation-delay:0.6s}
.star-ico:nth-child(4){animation-delay:0.9s}.star-ico:nth-child(5){animation-delay:1.2s}
@keyframes twinkle{0%,100%{opacity:0.5;transform:scale(0.8)}50%{opacity:1;transform:scale(1.3)}}
.msg{line-height:2.2;margin-bottom:2rem}
.msg p{color:rgba(255,255,255,0.6);font-size:1rem;letter-spacing:2px;opacity:0;transform:translateY(10px);animation:fadeUp 0.6s ease forwards}
.msg p:nth-child(1){animation-delay:0.6s}.msg p:nth-child(2){animation-delay:0.9s}
.msg p:nth-child(3){animation-delay:1.2s}.msg p:nth-child(4){animation-delay:1.5s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.msg .hl{background:linear-gradient(135deg,#B8A0FF,#7C6BDB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}
.emoji-big{font-size:4.5rem;margin:1rem 0 1.5rem;animation:bounce 2.2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.btn{background:linear-gradient(135deg,#7C6BDB,#5A4AB8);border:none;color:white;padding:1rem 3rem;border-radius:50px;
font-size:1.05rem;font-weight:600;cursor:pointer;letter-spacing:3px;transition:all 0.3s ease;
box-shadow:0 8px 35px rgba(124,107,219,0.3);position:relative;overflow:hidden}
.btn::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 60%);opacity:0;transition:opacity 0.3s ease}
.btn:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 14px 45px rgba(124,107,219,0.5)}
.btn:hover::before{opacity:1}.btn:active{transform:scale(0.97)}
.foot{margin-top:2rem;font-size:0.7rem;color:rgba(255,255,255,0.1);letter-spacing:3px}
#conf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:hidden}
.cf{position:absolute;top:-20px;width:10px;height:10px;opacity:0;animation:fall var(--d) linear forwards}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(var(--r));opacity:0}}
.ol{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);
z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
.ol.show{opacity:1;pointer-events:auto}
.ol-box{background:linear-gradient(145deg,#1a1a3e,#1e1040);border:1px solid rgba(180,160,255,0.12);
border-radius:32px;padding:3rem 2.5rem;max-width:480px;width:90%;text-align:center;
transform:scale(0.7);transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);box-shadow:0 50px 120px rgba(0,0,0,0.6)}
.ol.show .ol-box{transform:scale(1)}
.ol-box .bi{font-size:5rem;margin-bottom:1rem}
.ol-box h2{background:linear-gradient(135deg,#B8A0FF,#7C6BDB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
font-size:1.8rem;margin-bottom:0.8rem;letter-spacing:3px}
.ol-box p{color:rgba(255,255,255,0.6);line-height:1.9;font-size:0.95rem;margin-bottom:1.5rem}
.btn-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:white;
padding:0.6rem 2rem;border-radius:50px;cursor:pointer;font-size:0.95rem;letter-spacing:2px;transition:all 0.3s ease}
.btn-close:hover{background:rgba(255,255,255,0.16)}
@media(max-width:500px){
.card{padding:2.5rem 1.5rem;border-radius:28px}
.title{font-size:2rem}.sub{font-size:1rem}.emoji-big{font-size:3.5rem}.btn{padding:0.8rem 2rem;font-size:0.95rem}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>
<div class="card">
<div class="ornament">✦ ✦ ✦</div>
<div class="title"><span class="prefix">祝</span><span class="name">宋闻溪</span></div>
<div class="sub">☆ 天 天 开 心 ☆</div><hr class="div">
<div class="stars-row"><span class="star-ico">⭐</span><span class="star-ico">🌟</span><span class="star-ico">✨</span><span class="star-ico">🌟</span><span class="star-ico">⭐</span></div>
<div class="msg">
<p>愿你眼中有星辰</p><p>心中有<span class="hl">光芒</span></p>
<p>每一天都过得<span class="hl">闪闪发光</span></p><p>你本身就是最美的风景 ✨</p>
</div>
<div class="emoji-big">🌟</div>
<button class="btn" onclick="show()">点 击 查 收 惊 喜 💫</button>
<div class="foot">— made with ❤️ —</div>
</div>
<div id="conf"></div>
<div class="ol" id="ol">
<div class="ol-box">
<div class="bi">🎉</div>
<h2>宋闻溪，天天开心！</h2>
<p>愿你每天都充满惊喜<br>每个愿望都能实现<br>身边总有温暖的人陪伴<br>前路总有灿烂的光指引<br><br>你值得这世间所有的美好 🌟</p>
<button class="btn-close" onclick="hide()">收到啦 💕</button>
</div>
</div>
<script>
(function(){
const c=document.getElementById("bg"),ctx=c.getContext("2d");let w,h,pts=[];
function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;pts=[];
for(let i=0;i<200;i++){pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+0.3,a:Math.random(),da:(Math.random()-0.5)*0.006,dx:(Math.random()-0.5)*0.12,dy:(Math.random()-0.5)*0.12})}}
function draw(){ctx.clearRect(0,0,w,h);for(const p of pts){p.a+=p.da;if(p.a>1)p.a=1;if(p.a<0.1)p.a=0.1;p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,"+p.a+")";ctx.fill()}
requestAnimationFrame(draw)}
window.addEventListener("resize",resize);resize();draw()})();
function launchCf(){const c=document.getElementById("conf");const cl=["#7C6BDB","#B8A0FF","#6BB5FF","#4D96FF","#FF6BDF","#A29BFE","#FF9F43","#FD79A8"];const sh=["\u25CF","\u25A0","\u25B2","\u2605","\u25C6"];for(let i=0;i<150;i++){setTimeout(()=>{const e=document.createElement("div");e.className="cf";e.textContent=sh[Math.floor(Math.random()*sh.length)];e.style.left=Math.random()*100+"%";e.style.color=cl[Math.floor(Math.random()*cl.length)];e.style.fontSize=(Math.random()*16+8)+"px";e.style.setProperty("--d",(Math.random()*2+2)+"s");e.style.setProperty("--r",(Math.random()*720+360)+"deg");c.appendChild(e);setTimeout(()=>e.remove(),4500)},i*25)}}
function show(){launchCf();setTimeout(()=>document.getElementById("ol").classList.add("show"),400)}
function hide(){document.getElementById("ol").classList.remove("show");launchCf()}
document.getElementById("ol").addEventListener("click",function(e){if(e.target===this)hide()});
</script>
</body>
</html>
